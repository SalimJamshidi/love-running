<body>
    <header>
        <a href="index.html">
            <h1 id="logo">Love Running</h1>
        </a>
        <input type="checkbox" id="nav-toggle" name="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <i class="fa-solid fa-bars"></i></label>
       <nav>
            <ul id="menu">
                <li><a href="index.html" >Home</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="signup">
            <form id="signup-form" method="post" action="https://formdump.codeinstitute.net">
                <h2><i class="fa-solid fa-heart"></i> Let's get you signed up!</h2>

                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" class="text-input" required>
                <br>

                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" class="text-input" required>
                <br>

                <label for="email-address">Email Address</label>
                <input type="email" id="email-address" name="email-address" class="text-input" required>

                <!--Radio buttons in divs, parent class radio buttons -->
                <div class="radio-buttons">
                    <div>
                        <label for="road">Road</label>
                        <input type="radio" id="road" name="running-preference" value="road" checked>
                    </div>
                    <div>
                        <label for="trail">Trail</label>
                        <input type="radio" id="trail" name="running-preference" value="trail">
                    </div>
                    <div>
                        <label for="both">Both</label>
                        <input type="radio" id="both" name="running-preference" value="both">

                        <!--Submit button with class join button-->
                        <button type="submit" class="join-button">Lets's Run!</button>
                    </div>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <ul id="social-networks">
           <li> <a href="https://www.facebook.com/" target="_blank" rel="noopener"
                    aria-label="Visit our Facebook page (opens in a new tab)">
                    <i class="fa-brands fa-facebook"></i></a>
                    </li>
                    <!--insta icon-->

                    aria-label="Visit our Instagram page (opens in a new tab)">

                    </li>
                    <li>
                        <a href="https://www.twitter.com/" target="_blank" rel="noopenner"
                        aria-label="Visit our twitter page (open in a new tabe)">
                    <i class="fa-brands fa-twitter"></i></a>
                    </li>
                    <li> 
                        <a href="https://www.youtube.com/" target="_blank" rel="noopenner"
                        aria-label="visit our youtube channel (open in a new tab)">
                        <i class="fa-brands fa-youtube"></i></a>
                    </li>
        </ul>
    </footer>
